name: APK Schnellbau
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Entpack-Programm installieren
      run: sudo apt-get update && sudo apt-get install -y unzip

    - name: ZIP Datei entpacken
      run: unzip radar-rss.zip -d .

    - name: Fehlende Gradle-Wrapper-Dateien erzwingen
      run: |
        # Wir suchen zuerst nach einem build.gradle oder settings.gradle Ordner
        BUILD_GRADLE_PATH=$(find . -name "build.gradle*" | head -n 1)
        if [ -z "$BUILD_GRADLE_PATH" ]; then
          echo "Kritischer Fehler: Keine build.gradle gefunden. Ist das ein Android Projekt?"
          exit 1
        fi
        TARGET_DIR=$(dirname "$BUILD_GRADLE_PATH")
        echo "Android-Projekt gefunden in: $TARGET_DIR"
        
        # Falls kein gradlew da ist, generieren wir eins!
        if [ ! -f "$TARGET_DIR/gradlew" ]; then
          echo "gradlew fehlt! Generiere neue Gradle-Wrapper-Dateien..."
          cd "$TARGET_DIR"
          gradle wrapper --gradle-version 8.0
          cd -
        fi
        
        GRADLEW_PATH=$(find . -name gradlew)
        chmod +x "$GRADLEW_PATH"
        echo "PROJECT_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: APK bauen
      run: |
        cd ${{ env.PROJECT_DIR }}
        ./gradlew assembleDebug

    - name: APK bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: News-App-APK
        path: |
          **/build/outputs/apk/debug/app-debug.apk

